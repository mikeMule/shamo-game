<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SHAMO — Login</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500;700&family=Noto+Serif+Ethiopic:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #08070A;
            --gold: #E8B84B;
            --gold2: #C8860A;
            --gold3: #f7e07a;
            --green: #22C55E;
            --red: #EF4444;
            --cream: #F5EDD8;
            --muted: rgba(245, 237, 216, 0.38);
            --muted2: rgba(245, 237, 216, 0.14);
            --card: #131018;
            --border: rgba(255, 255, 255, 0.07);
            --border2: rgba(255, 255, 255, 0.13);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            inset: 0;
        }

        body {
            background: var(--bg);
            color: var(--cream);
            font-family: 'DM Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── NOISE + SCANLINES ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.022;
            pointer-events: none;
            z-index: 99;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.035) 2px, rgba(0, 0, 0, 0.035) 3px);
            pointer-events: none;
            z-index: 98;
        }

        /* ── AMBIENT GLOW ── */
        .amb {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(232, 184, 75, 0.11) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 90%, rgba(34, 197, 94, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 60%);
        }

        /* ── ETH FLAG ── */
        .flag-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            z-index: 100;
            background: linear-gradient(90deg, #E63946 0 33.33%, #E8B84B 33.33% 66.66%, #22C55E 66.66% 100%);
        }

        /* ── PARTICLES ── */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 0.4;
            }

            100% {
                transform: translateY(-10vh) scale(1.2);
                opacity: 0;
            }
        }

        /* ── CARD ── */
        .login-wrap {
            position: relative;
            z-index: 10;
            width: min(360px, calc(100vw - 32px));
            animation: wrapIn 0.7s cubic-bezier(0.34, 1.36, 0.64, 1);
        }

        @keyframes wrapIn {
            from {
                opacity: 0;
                transform: translateY(32px) scale(0.92);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .brand-top {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-eth {
            font-family: 'Noto Serif Ethiopic', serif;
            font-size: 52px;
            color: var(--gold);
            filter: drop-shadow(0 0 24px rgba(232, 184, 75, 0.5));
            animation: brandPulse 2.5s ease infinite;
        }

        @keyframes brandPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 24px rgba(232, 184, 75, 0.5));
            }

            50% {
                filter: drop-shadow(0 0 36px rgba(232, 184, 75, 0.8));
            }
        }

        .brand-name {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, var(--gold3), var(--gold), var(--gold2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 4px;
        }

        .brand-sub {
            font-size: 9px;
            letter-spacing: 4px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 4px;
        }

        .card {
            background: linear-gradient(145deg, rgba(19, 16, 24, 0.96), rgba(24, 22, 31, 0.96));
            border: 1px solid var(--border2);
            border-radius: 24px;
            padding: 28px 24px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(232, 184, 75, 0.06) inset;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(232, 184, 75, 0.4), transparent);
        }

        /* ── USER PROFILE AREA ── */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }

        .avatar-wrap {
            position: relative;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid rgba(232, 184, 75, 0.3);
            box-shadow: 0 0 0 6px rgba(232, 184, 75, 0.06), 0 8px 28px rgba(232, 184, 75, 0.15);
            background: linear-gradient(135deg, var(--gold), var(--gold2));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-initials {
            font-family: 'Playfair Display', serif;
            font-size: 30px;
            font-weight: 900;
            color: #0A0800;
        }

        .avatar-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--green);
            border: 2px solid var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .user-name {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            line-height: 1.2;
        }

        .user-handle {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 1.5px;
            text-align: center;
        }

        .user-id {
            font-size: 10px;
            color: rgba(232, 184, 75, 0.5);
            letter-spacing: 1px;
            text-align: center;
            margin-top: 2px;
        }

        .tg-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(41, 182, 246, 0.1);
            border: 1px solid rgba(41, 182, 246, 0.25);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 10px;
            color: #4FC3F7;
            letter-spacing: 1px;
        }

        /* ── INFO ROW ── */
        .info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 20px;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .info-lbl {
            font-size: 8px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
        }

        .info-val {
            font-size: 12px;
            font-weight: 700;
            color: var(--cream);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info-val.gold {
            color: var(--gold);
        }

        /* ── PHONE REQUEST ── */
        .phone-section {
            background: rgba(232, 184, 75, 0.04);
            border: 1px solid rgba(232, 184, 75, 0.15);
            border-radius: 14px;
            padding: 14px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .phone-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .phone-text {
            flex: 1;
        }

        .phone-text p {
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .phone-text span {
            font-size: 10px;
            color: var(--muted);
        }

        .phone-btn {
            padding: 8px 14px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            background: rgba(232, 184, 75, 0.15);
            color: var(--gold);
            font-size: 11px;
            font-weight: 700;
            font-family: 'DM Mono', monospace;
            letter-spacing: 1px;
            border: 1px solid rgba(232, 184, 75, 0.25);
            transition: all 0.2s;
            white-space: nowrap;
        }

        .phone-btn:hover {
            background: rgba(232, 184, 75, 0.25);
        }

        .phone-btn.shared {
            background: rgba(34, 197, 94, 0.1);
            color: var(--green);
            border-color: rgba(34, 197, 94, 0.3);
        }

        /* ── PLAY BUTTON ── */
        .play-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            color: #0A0800;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(232, 184, 75, 0.35), 0 2px 0 rgba(255, 255, 255, 0.15) inset;
            transition: transform 0.12s, box-shadow 0.2s;
            margin-top: 4px;
        }

        .play-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -60%;
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
            animation: btnShine 2.5s ease infinite;
        }

        @keyframes btnShine {
            0% {
                left: -60%;
            }

            100% {
                left: 120%;
            }
        }

        .play-btn:active {
            transform: scale(0.97);
            box-shadow: 0 3px 14px rgba(232, 184, 75, 0.2);
        }

        .play-btn.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        .play-btn.loading::after {
            content: '';
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0, 0, 0, 0.3);
            border-top-color: #0A0800;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── GUEST MODE ── */
        .guest-row {
            text-align: center;
            margin-top: 14px;
        }

        .guest-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'DM Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            text-decoration: underline;
            text-underline-offset: 3px;
            transition: color 0.2s;
            padding: 4px;
        }

        .guest-btn:hover {
            color: var(--cream);
        }

        /* ── DISCLAIMER ── */
        .disclaimer {
            text-align: center;
            margin-top: 20px;
            font-size: 9px;
            color: var(--muted2);
            letter-spacing: 0.5px;
            line-height: 1.7;
        }

        .disclaimer a {
            color: rgba(232, 184, 75, 0.5);
            text-decoration: none;
        }

        /* ── LOADER SCREEN ── */
        #loaderScreen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            transition: opacity 0.5s;
        }

        #loaderScreen.out {
            opacity: 0;
            pointer-events: none;
        }

        .ls-eth {
            font-family: 'Noto Serif Ethiopic', serif;
            font-size: 68px;
            color: var(--gold);
            animation: ldPulse 1.4s ease infinite;
            filter: drop-shadow(0 0 24px rgba(232, 184, 75, 0.4));
        }

        @keyframes ldPulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.55;
                transform: scale(0.9);
            }
        }

        .ls-ring {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 3px solid rgba(232, 184, 75, 0.12);
            border-top-color: var(--gold);
            animation: spin 0.75s linear infinite;
        }

        .ls-txt {
            font-size: 9px;
            letter-spacing: 5px;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1A1F2E;
            border: 1px solid #2A2F42;
            border-radius: 12px;
            padding: 12px 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9998;
            white-space: nowrap;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        #toast.success {
            border-left: 4px solid #22C55E;
            color: #4ADE80;
        }

        #toast.error {
            border-left: 4px solid #EF4444;
            color: #FCA5A5;
        }

        #toast.info {
            border-left: 4px solid #3B82F6;
            color: #60A5FA;
        }
    </style>
</head>

<body>

    <!-- LOADER -->
    <div id="loaderScreen">
        <div class="ls-eth">ሻሞ</div>
        <div class="ls-ring"></div>
        <div class="ls-txt">Connecting...</div>
    </div>

    <!-- AMBIENT + PARTICLES -->
    <div class="amb"></div>
    <div class="flag-bar"></div>
    <div class="particles" id="particles"></div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- MAIN LOGIN CARD -->
    <div class="login-wrap" id="loginWrap" style="display:none">

        <div class="brand-top">
            <div class="brand-eth">ሻሞ</div>
            <div class="brand-name">SHAMO</div>
            <div class="brand-sub">Ethiopian Prize Game</div>
        </div>

        <div class="card">

            <!-- Profile -->
            <div class="profile-section">
                <div class="avatar-wrap">
                    <div class="avatar" id="avatar">
                        <span class="avatar-initials" id="avatarInitials">?</span>
                    </div>
                    <div class="avatar-badge">✓</div>
                </div>
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-handle" id="userHandle">@username</div>
                <div class="user-id" id="userId">ID: —</div>
                <div class="tg-chip">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="#4FC3F7">
                        <path
                            d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.96 6.504-1.356 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" />
                    </svg>
                    Telegram Verified
                </div>
            </div>

            <!-- Info row -->
            <div class="info-row">
                <div class="info-item">
                    <div class="info-lbl">Language</div>
                    <div class="info-val gold" id="infoLang">EN</div>
                </div>
                <div class="info-item">
                    <div class="info-lbl">Phone</div>
                    <div class="info-val" id="infoPhone">Not shared</div>
                </div>
                <div class="info-item">
                    <div class="info-lbl">Games Played</div>
                    <div class="info-val" id="infoGames">0</div>
                </div>
                <div class="info-item">
                    <div class="info-lbl">Balance</div>
                    <div class="info-val gold" id="infoBalance">$0.00</div>
                </div>
            </div>

            <!-- Phone request -->
            <div class="phone-section" id="phoneSection">
                <div class="phone-icon">📱</div>
                <div class="phone-text">
                    <p>Share Phone Number</p>
                    <span>Required for withdrawals</span>
                </div>
                <button class="phone-btn" id="phoneBtn" onclick="requestPhone()">Share</button>
            </div>

            <!-- Play button -->
            <button class="play-btn" id="playBtn" onclick="enterGame()">
                🎮 &nbsp;ENTER SHAMO
            </button>

            <div class="guest-row">
                <button class="guest-btn" onclick="enterGame(true)">Continue without sharing phone →</button>
            </div>

        </div>

        <div class="disclaimer">
            By playing you agree to SHAMO's terms.<br>
            Powered by <a href="https://t.me/ShamoET_Bot">@ShamoET_Bot</a> · Ethiopian Prize Game
        </div>

    </div>

    <script>
        const API = 'http://localhost:8001/api';

        // ── PARTICLES ──
        (function () {
            const c = ['rgba(232,184,75,', 'rgba(34,197,94,', 'rgba(168,85,247,'];
            const wrap = document.getElementById('particles');
            for (let i = 0; i < 18; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const col = c[Math.floor(Math.random() * c.length)];
                const sz = Math.random() * 4 + 2;
                p.style.cssText = `
      left:${Math.random() * 100}%;
      width:${sz}px;height:${sz}px;
      background:${col}${Math.random() * 0.5 + 0.2});
      animation-duration:${Math.random() * 12 + 8}s;
      animation-delay:${Math.random() * 8}s;`;
                wrap.appendChild(p);
            }
        })();

        // ── TOAST ──
        let _toastTimer;
        function toast(msg, type = 'info', dur = 3000) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `show ${type}`;
            clearTimeout(_toastTimer);
            _toastTimer = setTimeout(() => el.classList.remove('show'), dur);
        }

        // ── STATE ──
        let tgUser = null;
        let phoneShared = false;
        let dbUser = null;

        // ── INIT ──
        const twa = window.Telegram?.WebApp;

        async function init() {
            // Expand Mini App to full height
            if (twa) {
                twa.expand();
                twa.setHeaderColor('#08070A');
                twa.setBackgroundColor('#08070A');
            }

            // Get Telegram user
            tgUser = twa?.initDataUnsafe?.user || null;

            // Dev fallback (browser testing outside Telegram)
            if (!tgUser) {
                tgUser = {
                    id: 999999999,
                    first_name: 'Test',
                    last_name: 'Player',
                    username: 'testplayer',
                    language_code: 'en',
                    photo_url: null
                };
            }

            renderProfile();

            // Check if already logged in (returning user)
            const stored = localStorage.getItem('shamo_player');
            if (stored) {
                try {
                    dbUser = JSON.parse(stored);
                    updateFromDB(dbUser);
                } catch (e) { localStorage.removeItem('shamo_player'); }
            }

            // Register / fetch from API
            await loginToAPI();

            // Hide loader, show card
            setTimeout(() => {
                document.getElementById('loaderScreen').classList.add('out');
                document.getElementById('loginWrap').style.display = '';
            }, 600);
        }

        function renderProfile() {
            if (!tgUser) return;
            const name = [tgUser.first_name, tgUser.last_name].filter(Boolean).join(' ');
            const initials = (tgUser.first_name?.[0] || '') + (tgUser.last_name?.[0] || tgUser.first_name?.[1] || '');

            document.getElementById('userName').textContent = name || 'Player';
            document.getElementById('userHandle').textContent = tgUser.username ? `@${tgUser.username}` : `ID ${tgUser.id}`;
            document.getElementById('userId').textContent = `Telegram ID: ${tgUser.id}`;
            document.getElementById('avatarInitials').textContent = initials.toUpperCase() || '?';
            document.getElementById('infoLang').textContent = (tgUser.language_code || 'en').toUpperCase();

            // If Telegram provided photo_url, show it
            if (tgUser.photo_url) {
                const av = document.getElementById('avatar');
                av.innerHTML = `<img src="${tgUser.photo_url}" alt="avatar" onerror="this.parentNode.innerHTML='<span class=avatar-initials>${initials.toUpperCase()}</span>'">`;
            }
        }

        async function loginToAPI() {
            try {
                const initData = twa?.initData || '';
                const payload = {
                    telegram_id: tgUser.id,
                    first_name: tgUser.first_name || '',
                    last_name: tgUser.last_name || null,
                    telegram_username: tgUser.username || null,
                    language_code: tgUser.language_code || 'en',
                    photo_url: tgUser.photo_url || null,
                    init_data: initData
                };

                const res = await fetch(`${API}/player/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    dbUser = await res.json();
                    localStorage.setItem('shamo_player', JSON.stringify(dbUser));
                    updateFromDB(dbUser);
                }
            } catch (e) {
                console.warn('API not reachable, proceeding offline:', e.message);
            }
        }

        function updateFromDB(user) {
            if (!user) return;
            document.getElementById('infoGames').textContent = user.games_played ?? 0;
            document.getElementById('infoBalance').textContent = `$${Number(user.balance || 0).toFixed(2)}`;
            if (user.phone_number) {
                document.getElementById('infoPhone').textContent = user.phone_number;
                markPhoneShared();
            }
        }

        async function requestPhone() {
            if (!twa?.requestContact) {
                toast('Open inside Telegram to share phone', 'info');
                return;
            }
            try {
                twa.requestContact((ok, contact) => {
                    if (ok && contact) {
                        const phone = contact.contact?.phone_number || contact.phone_number;
                        if (phone) {
                            savePhone(phone);
                        }
                    }
                });
            } catch (e) {
                toast('Could not request contact', 'error');
            }
        }

        async function savePhone(phone) {
            document.getElementById('infoPhone').textContent = phone;
            markPhoneShared();
            toast('📱 Phone number shared!', 'success');

            // Save to API
            if (dbUser?.id) {
                try {
                    await fetch(`${API}/player/phone`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: dbUser.id, phone_number: phone })
                    });
                    dbUser.phone_number = phone;
                    localStorage.setItem('shamo_player', JSON.stringify(dbUser));
                } catch (e) { }
            }
        }

        function markPhoneShared() {
            phoneShared = true;
            const btn = document.getElementById('phoneBtn');
            btn.textContent = '✓ Shared';
            btn.classList.add('shared');
            btn.disabled = true;
        }

        async function enterGame(skipPhone = false) {
            if (!phoneShared && !skipPhone) {
                toast('📱 Share your phone for easy withdrawals!', 'info');
                // Still allow after 1.5s if they tap again
            }

            const btn = document.getElementById('playBtn');
            btn.classList.add('loading');
            btn.textContent = '🎮  Loading Game...';

            // Save session state for game page
            if (dbUser) localStorage.setItem('shamo_player', JSON.stringify(dbUser));
            if (tgUser) localStorage.setItem('shamo_tg_user', JSON.stringify(tgUser));

            // Short transition delay
            await new Promise(r => setTimeout(r, 500));

            // Navigate to game
            window.location.href = 'index.html';
        }

        // ── BOOT ──
        init();
    </script>
</body>

</html>
